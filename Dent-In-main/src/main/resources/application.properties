spring.application.name=dental-clinic

# ==================== DATABASE ====================
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:dentaldb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 console — http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==================== JWT ====================
jwt.secret=${JWT_SECRET:changeThisToASecureRandomStringAtLeast32CharactersLong!!}
jwt.expiration=86400000

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ==================== SERVER ====================
server.port=8080

# ==================== CORS ====================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:8080}

# ==================== EMAIL (SMTP — used for OTP + notifications) ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==================== SUPABASE (OTP Email) ====================
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}

# ==================== MAPTILER (Maps) ====================
maptiler.key=${MAPTILER_KEY:}

# ==================== AI (Hugging Face) ====================
hf.api.token=${HF_API_TOKEN:}

# ==================== SWAGGER ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
