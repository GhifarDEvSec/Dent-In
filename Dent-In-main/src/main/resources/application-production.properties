# ============================================
# Production Profile — Supabase + JWT + AI + Email + Maps
# Activated via SPRING_PROFILES_ACTIVE=production
# ============================================

# ---- Database (Supabase PostgreSQL) ----
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 console in production
spring.h2.console.enabled=false

# ---- JWT ----
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ---- AI ----
hf.api.token=${HF_API_TOKEN}

# ---- Analytics ----
posthog.api.key=${POSTHOG_API_KEY}

# ---- CORS (add your production domains) ----
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ---- Upload directory ----
app.upload.dir=uploads

# ---- Email (SMTP) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- Google Maps ----
google.maps.api.key=${GOOGLE_MAPS_API_KEY}
